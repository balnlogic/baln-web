<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trip Planner — Surfing & Snowboard</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0a0a; font-family:-apple-system,sans-serif; }
.tabs {
  position:fixed; top:0; left:0; right:0; z-index:10000;
  display:flex; background:rgba(10,10,10,0.95); backdrop-filter:blur(10px);
  border-bottom:1px solid #333; padding:0 20px;
}
.tab {
  padding:14px 24px; color:#888; font-size:14px; font-weight:600;
  cursor:pointer; border-bottom:2px solid transparent; transition:all 0.2s;
  text-decoration:none;
}
.tab:hover { color:#fff; }
.tab.active { color:#fff; border-bottom-color:#00ff88; }
.tab.snow.active { border-bottom-color:#00ccff; }
.tab .emoji { font-size:16px; margin-right:6px; }
.brand { padding:14px 0; margin-right:auto; }
.brand a { color:#555; text-decoration:none; font-size:12px; }
iframe {
  position:fixed; top:48px; left:0; right:0; bottom:0;
  width:100%; height:calc(100vh - 48px); border:none;
}
.hidden { display:none; }
</style>
</head>
<body>

<div class="tabs">
  <div class="brand"><a href="https://baln.app">← baln.app</a></div>
  <a class="tab active" id="tab-surf" onclick="switchTab('surf')">
    <span class="emoji">🏄</span>Surfing
  </a>
  <a class="tab snow" id="tab-snow" onclick="switchTab('snow')">
    <span class="emoji">🏔️</span>Snowboard
  </a>
</div>

<iframe id="frame-surf" src="/surfing/surf.html"></iframe>
<iframe id="frame-snow" src="/surfing/snow.html" class="hidden"></iframe>

<script>
function switchTab(type) {
  document.getElementById('tab-surf').classList.toggle('active', type==='surf');
  document.getElementById('tab-snow').classList.toggle('active', type==='snow');
  document.getElementById('frame-surf').classList.toggle('hidden', type!=='surf');
  document.getElementById('frame-snow').classList.toggle('hidden', type!=='snow');
}
</script>

</body>
</html>
