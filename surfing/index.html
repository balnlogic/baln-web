<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adventure Trip Planner</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0a0a; font-family:-apple-system,sans-serif; }
.tabs {
  position:fixed; top:0; left:0; right:0; z-index:10000;
  display:flex; background:rgba(10,10,10,0.95); backdrop-filter:blur(10px);
  border-bottom:1px solid #333; padding:0 10px; overflow-x:auto;
  -webkit-overflow-scrolling:touch;
}
.tab {
  padding:12px 16px; color:#888; font-size:13px; font-weight:600;
  cursor:pointer; border-bottom:2px solid transparent; transition:all 0.2s;
  text-decoration:none; white-space:nowrap; flex-shrink:0;
}
.tab:hover { color:#fff; }
.tab.active { color:#fff; }
.tab[data-id="surf"].active { border-bottom-color:#00ff88; }
.tab[data-id="snow"].active { border-bottom-color:#00ccff; }
.tab[data-id="scuba"].active { border-bottom-color:#00ffcc; }
.tab[data-id="freedive"].active { border-bottom-color:#ff00ff; }
.tab[data-id="trek"].active { border-bottom-color:#ff6600; }
.brand { padding:12px 8px; margin-right:auto; flex-shrink:0; }
.brand a { color:#555; text-decoration:none; font-size:11px; }
iframe {
  position:fixed; top:46px; left:0; right:0; bottom:0;
  width:100%; height:calc(100vh - 46px); border:none;
}
.hidden { display:none; }
@media(max-width:600px) { .tab { padding:10px 12px; font-size:12px; } }
</style>
</head>
<body>

<div class="tabs">
  <div class="brand"><a href="https://baln.app">← baln</a></div>
  <a class="tab active" data-id="surf" onclick="switchTab('surf')">🏄 Surfing</a>
  <a class="tab" data-id="snow" onclick="switchTab('snow')">🏔️ Snow</a>
  <a class="tab" data-id="scuba" onclick="switchTab('scuba')">🤿 Scuba</a>
  <a class="tab" data-id="freedive" onclick="switchTab('freedive')">🫧 Freedive</a>
  <a class="tab" data-id="trek" onclick="switchTab('trek')">🥾 Trekking</a>
</div>

<iframe id="frame-surf" src="/surfing/surf.html"></iframe>
<iframe id="frame-snow" src="/surfing/snow.html" class="hidden"></iframe>
<iframe id="frame-scuba" src="/surfing/scuba.html" class="hidden"></iframe>
<iframe id="frame-freedive" src="/surfing/freedive.html" class="hidden"></iframe>
<iframe id="frame-trek" src="/surfing/trek.html" class="hidden"></iframe>

<script>
function switchTab(id) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`[data-id="${id}"]`).classList.add('active');
  document.querySelectorAll('iframe').forEach(f => f.classList.add('hidden'));
  document.getElementById('frame-' + id).classList.remove('hidden');
}
</script>

</body>
</html>
