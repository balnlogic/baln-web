<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>baln internal</title>
  <meta name="robots" content="noindex, nofollow" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #121212;
      --surface: #1e1e1e;
      --surface-hover: #252525;
      --border: #2e2e2e;
      --green: #4CAF50;
      --green-dim: #388E3C;
      --text: #e8e8e8;
      --text-muted: #888;
      --danger: #f44336;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Password Gate ── */
    #gate {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .gate-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 380px;
      text-align: center;
    }

    .gate-logo {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--green);
      margin-bottom: 8px;
    }

    .gate-title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .gate-sub {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 28px;
    }

    .gate-input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 15px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 12px;
      letter-spacing: 0.06em;
    }

    .gate-input:focus {
      border-color: var(--green);
    }

    .gate-input.error {
      border-color: var(--danger);
    }

    .gate-btn {
      width: 100%;
      background: var(--green);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 13px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .gate-btn:hover {
      background: var(--green-dim);
    }

    .gate-btn:active {
      transform: scale(0.98);
    }

    .gate-error {
      color: var(--danger);
      font-size: 13px;
      margin-top: 10px;
      min-height: 18px;
    }

    /* ── Hub ── */
    #hub {
      display: none;
      flex-direction: column;
      min-height: 100vh;
    }

    /* Header */
    .hub-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 10;
    }

    .hub-brand {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--green);
    }

    .logout-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-muted);
      font-size: 12px;
      padding: 6px 14px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .logout-btn:hover {
      border-color: var(--danger);
      color: var(--danger);
    }

    /* Main content */
    .hub-main {
      flex: 1;
      padding: 40px 24px;
      max-width: 860px;
      margin: 0 auto;
      width: 100%;
    }

    .hub-heading {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .hub-sub {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 36px;
    }

    /* Tiles */
    .tiles {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 16px;
    }

    .tile {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 28px 24px;
      text-decoration: none;
      color: var(--text);
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
      cursor: pointer;
    }

    .tile:hover {
      background: var(--surface-hover);
      border-color: var(--green);
      transform: translateY(-2px);
    }

    .tile-icon {
      font-size: 28px;
      margin-bottom: 4px;
    }

    .tile-title {
      font-size: 16px;
      font-weight: 700;
    }

    .tile-desc {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.5;
    }

    .tile-arrow {
      margin-top: auto;
      padding-top: 14px;
      font-size: 18px;
      color: var(--green);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .tile:hover .tile-arrow {
      opacity: 1;
    }

    /* Footer */
    .hub-footer {
      padding: 20px 24px;
      text-align: center;
      font-size: 11px;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
    }

    @media (max-width: 480px) {
      .gate-card {
        padding: 32px 24px;
      }
      .hub-main {
        padding: 28px 16px;
      }
      .tiles {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

  <!-- ── Password Gate ── -->
  <div id="gate">
    <div class="gate-card">
      <div class="gate-logo">baln</div>
      <div class="gate-title">내부 허브</div>
      <div class="gate-sub">이 페이지는 팀 전용입니다</div>

      <input
        id="pwInput"
        type="password"
        class="gate-input"
        placeholder="비밀번호 입력"
        autocomplete="current-password"
        aria-label="비밀번호"
      />
      <button class="gate-btn" onclick="handleLogin()">입장하기</button>
      <div class="gate-error" id="gateError" role="alert"></div>
    </div>
  </div>

  <!-- ── Hub Dashboard ── -->
  <div id="hub">
    <header class="hub-header">
      <span class="hub-brand">baln internal</span>
      <button class="logout-btn" onclick="handleLogout()">로그아웃</button>
    </header>

    <main class="hub-main">
      <h1 class="hub-heading">내부 허브</h1>
      <p class="hub-sub">팀 전용 도구 모음</p>

      <div class="tiles">
        <a href="/admin/" class="tile">
          <div class="tile-icon">🛠️</div>
          <div class="tile-title">관리자 대시보드</div>
          <div class="tile-desc">사용자 관리 및 콘텐츠 관리</div>
          <div class="tile-arrow">→</div>
        </a>

        <a href="/briefing/" class="tile">
          <div class="tile-icon">📰</div>
          <div class="tile-title">모닝브리핑</div>
          <div class="tile-desc">AI 생성 투자 브리핑 관리</div>
          <div class="tile-arrow">→</div>
        </a>

        <a href="/admin/" class="tile">
          <div class="tile-icon">📋</div>
          <div class="tile-title">레코드</div>
          <div class="tile-desc">내부 기록 및 데이터 관리</div>
          <div class="tile-arrow">→</div>
        </a>
      </div>
    </main>

    <footer class="hub-footer">baln internal — 팀 전용 &nbsp;·&nbsp; 외부 공유 금지</footer>
  </div>

  <script>
    const AUTH_KEY = 'baln_internal_auth';
    const CORRECT_PW = 'qnwkehlwk1$';

    function showHub() {
      document.getElementById('gate').style.display = 'none';
      const hub = document.getElementById('hub');
      hub.style.display = 'flex';
    }

    function showGate() {
      document.getElementById('hub').style.display = 'none';
      document.getElementById('gate').style.display = 'flex';
    }

    function handleLogin() {
      const input = document.getElementById('pwInput');
      const errorEl = document.getElementById('gateError');

      if (input.value === CORRECT_PW) {
        sessionStorage.setItem(AUTH_KEY, 'true');
        input.classList.remove('error');
        errorEl.textContent = '';
        showHub();
      } else {
        input.classList.add('error');
        errorEl.textContent = '비밀번호가 틀렸습니다';
        input.value = '';
        input.focus();
      }
    }

    function handleLogout() {
      sessionStorage.removeItem(AUTH_KEY);
      location.reload();
    }

    // Enter key support on password field
    document.getElementById('pwInput').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') handleLogin();
    });

    // On load: check existing auth
    if (sessionStorage.getItem(AUTH_KEY) === 'true') {
      showHub();
    }
  </script>
</body>
</html>
